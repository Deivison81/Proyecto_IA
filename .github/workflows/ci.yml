name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend Lint + Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint (non-blocking)
        continue-on-error: true
        run: npm run lint

      - name: Build
        run: npm run build

  backend:
    name: Backend Test + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proyectoIAbkacend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: proyectoIAbkacend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Unit tests
        run: npm test -- --runInBand

      - name: E2E tests
        run: npm run test:e2e -- --runInBand

      - name: Build
        run: npm run build